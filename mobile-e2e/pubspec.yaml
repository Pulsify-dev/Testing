name: pulsify_mobile_e2e
description: >
  Pulsify Mobile E2E test suite — Flutter Patrol integration tests
  for Module 1 (Auth) and Module 5 (Playback).
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

# ---------------------------------------------------------------------------
# Runtime dependencies (the app under test is referenced as a path dep
# or run via the host app package; these are the test-side deps only).
# ---------------------------------------------------------------------------
dependencies:
  flutter:
    sdk: flutter

  # Patrol — the Flutter integration-test framework
  # https://pub.dev/packages/patrol
  patrol: ^3.6.1

  # For loading mobile-locators.json at test time
  flutter_test:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^4.0.0

  # Patrol CLI tooling (build / run driver)
  patrol_cli: ^2.6.0

  # Utility for reading JSON files in tests
  path: ^1.9.0

# ---------------------------------------------------------------------------
# Flutter / Patrol integration-test driver entry-point.
# The patrol CLI reads the `patrol` section below; see patrol.yaml for
# per-platform configuration.
# ---------------------------------------------------------------------------
flutter:
  uses-material-design: true

  # Required so Patrol can discover integration tests
  # (actual test files live under integration_test/)
  assets:
    - mobile-locators.json
